<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALKNUTNET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #080808; 
            background-image: radial-gradient(circle at 50% 0%, #151515 0%, #000000 70%);
            color: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; 
            padding: 40px 35px;
            max-width: 800px;
            width: 100%;
            margin-bottom: 20px;
        }

        .nav-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .nav-menu a {
            background: rgba(255, 255, 255, 0.05);
            color: #aaaaaa;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .nav-menu a:hover, .nav-menu a.active { color: #ffffff; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); }

        h1 { text-align: center; font-size: 28px; font-weight: 700; font-style: italic; letter-spacing: 2px; margin-bottom: 30px; }
        
        .media-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .media-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: border-color 0.3s ease;
        }
        .media-card:hover { border-color: rgba(255, 255, 255, 0.3); }
        
        .media-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .media-title i { color: #ff3333; }

 
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 15px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }


        .article-box {
            background: rgba(0, 0, 0, 0.5);
            border-left: 2px solid #2aabee;
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 15px;
        }
        .article-box h3 { font-size: 14px; font-style: italic; color: #bbbbbb; margin-bottom: 8px; }
        .article-box p { font-size: 13px; line-height: 1.5; color: #a0a0a0; }

        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            transition: background 0.3s ease;
            margin-top: 10px;
        }
        .download-link:hover { background: rgba(255, 255, 255, 0.2); }

        @media (min-width: 600px) {
            .media-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="nav-menu">
            <a href="index.html">General</a>
            <a href="archive.html" class="active">Resources</a>
            <a href="about.html">About</a>
        </div>
        
        <h1>RESOURCES</h1>

        <div class="media-grid">
            
    
            <div class="media-card">
                <div class="media-title"><i class="fab fa-youtube"></i>Test title</div>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            
                </div>
                <a href="#" class="download-link"><i class="fas fa-file-archive"></i>Download material</a>
            </div>

      
            <div class="media-card">
                <div class="media-title"><i class="fas fa-file-alt"></i>Test title</div>
                <div class="article-box">
                    <h3>Brief description:</h3>
                    <p>Test description article's.</p>
                </div>
                <a href="#" class="download-link"><i class="fas fa-file-pdf"></i> Read article Telegra.ph</a>
                <a href="#" class="download-link" style="margin-left: 10px;"><i class="fas fa-database"></i> Get dump</a>
            </div>

        </div>
    </div>
</body>
</html>
