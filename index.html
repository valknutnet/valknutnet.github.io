<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALKNUTNET</title>
    
    <!-- Подключаем иконки (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Более современный шрифт, похожий на Telegram-стиль (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">

    <style>
        /* Сброс стилей и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Мягкий, глубокий черный фон */
            background-color: #080808; 
            background-image: radial-gradient(circle at 50% 0%, #151515 0%, #000000 70%);
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Главный контейнер — Эффект Жидкого Стекла */
        .glass-container {
            /* Прозрачный фон с размытием */
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            /* Ключевая деталь: тонкая светящаяся граница */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
            
            /* Закругленные углы */
            border-radius: 24px; 
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Легкая анимация при наведении на контейнер */
        .glass-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255,255,255,0.02);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Логотип (в стиле Telegram, но в вашем стиле V) */
        .logo-icon {
            display: inline-block;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px;
            border: 2px solid #ffffff;
            border-radius: 16px; /* Скругление как в современных мессенджерах */
            width: 64px;
            height: 64px;
            line-height: 60px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* Заголовок */
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        /* Тонкий разделитель */
        .divider {
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 auto 25px auto;
            border-radius: 2px;
        }

        /* Описание деятельности */
        .description {
            font-size: 14px;
            line-height: 1.7;
            color: #b0b0b0; /* Светло-серый для мягкости */
            margin-bottom: 40px;
            font-weight: 400;
            padding: 0 10px;
        }

        /* Сетка для кнопок (2 колонки как в интерфейсах) */
        .link-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Ссылки-кнопки в стиле Telegram (чистые, прозрачные) */
        a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            text-decoration: none;
            padding: 18px 10px;
            border-radius: 14px; /* Скругление кнопок */
            border: 1px solid transparent;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.25s ease-in-out;
        }

        a i {
            font-size: 18px;
            color: #ffffff;
            transition: transform 0.2s ease;
        }

        /* Состояние наведения (кнопка начинает слегка светиться) */
        a:hover {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: scale(1.02); /* Легкое увеличение */
        }

        a:hover i {
            transform: translateY(-1px); /* Иконка чуть поднимается */
        }

        /* Состояние активного нажатия (как в реальном приложении) */
        a:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Цветовые акценты для иконок (легкие оттенки) */
        .youtube-link i { color: #ff3333; }
        .telegram-link i { color: #2aabee; }

        /* Адаптация для мобильных устройств (одна колонка) */
        @media (max-width: 600px) {
            .glass-container { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 22px; }
            .link-grid { grid-template-columns: 1fr; }
            .logo-icon { width: 56px; height: 56px; line-height: 52px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Иконка логотипа в новом стиле -->
        <div class="logo-icon">V</div>

        <!-- Название проекта -->
        <h1>VALKNUTNET</h1>
        
        <!-- Тонкий разделитель -->
        <div class="divider"></div>

        <!-- Короткое описание -->
        <div class="description">
            Независимое сообщество экспертов в области кибербезопасности, OSINT и цифрового анализа.<br><br>
            Информация — это ресурс. Мы добываем и защищаем данные. Логика превыше морализаторства.
        </div>

        <!-- Кнопки перехода -->
        <div class="link-grid">
            <a href="ССЫЛКА_НА_ТВОЙ_КАНАЛ_YOUTUBE" target="_blank" class="youtube-link">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="ССЫЛКА_НА_ТВОЙ_КАНАЛ_TELEGRAM" target="_blank" class="telegram-link">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
        </div>
    </div>

</body>
</html>
